workflows:
  ios-release:
    name: Tactical Eleven iOS Release to TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Build iOS archive
        script: |
          flutter build ipa --release --dart-define="SUPABASE_URL=$SUPABASE_URL" --dart-define="SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY"

    artifacts:
      - build/ios/ipa/*.ipa
      
    publishing:
      app_store_connect:
        auth: manual
        credentials:
          ios_distribution:
            certificate: $FCI_IOS_DISTRIBUTION_CERTIFICATE
            certificate_password: $FCI_IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
            provisioning_profile: $FCI_IOS_PROVISIONING_PROFILE
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
          - External Testers
