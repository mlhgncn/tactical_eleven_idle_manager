name: iOS Signing Setup (one-time)

# Creates the Apple Distribution certificate + App Store provisioning profile
# and stores them (encrypted) in the private git repo pointed to by
# MATCH_GIT_URL, entirely on GitHub's macOS runner — no local Mac needed.
#
# Run this ONCE (or again only if you need to rotate/recreate the cert).
# Every regular build (ios_release.yml) only ever reads from that repo
# read-only, it never creates certs itself.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to create/fetch a Distribution cert + App Store profile in your Apple Developer account'
        required: true

jobs:
  setup-signing:
    if: ${{ github.event.inputs.confirm == 'YES' }}
    name: Create match signing assets
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby (for fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run fastlane setup_signing
        run: bundle exec fastlane ios setup_signing
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
