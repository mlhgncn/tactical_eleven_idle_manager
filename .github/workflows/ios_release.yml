name: iOS Build & TestFlight

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_number:
        description: "Override CFBundleVersion (defaults to the GitHub run number)"
        required: false
        type: string

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # Gate on actual errors only — this repo currently has ~159 pre-existing
      # warning/info-level lints (dead code, missing @override, etc.) that
      # `flutter analyze` otherwise treats as fatal by default.
      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter test
        run: flutter test

  build-and-upload:
    name: Build IPA and upload to TestFlight
    runs-on: macos-15
    needs: analyze-and-test
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Ruby (for fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # Use the CocoaPods gem pinned in the Gemfile (installed for the same
      # Ruby ruby/setup-ruby just activated) instead of whatever CocoaPods
      # ships with the runner image for its default Ruby — a version
      # mismatch there is what makes `flutter build ipa` report "CocoaPods
      # is installed but broken" later.
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          bundle exec pod install --repo-update

      # Persists the Distribution cert + App Store provisioning profile
      # across runs so we only ever mint one via `cert`/`sigh` (Apple caps an
      # account at 3 active distribution certs). Used only when MATCH_GIT_URL
      # isn't set — see fastlane/Fastfile's signing_via_cert_and_sigh.
      #
      # Split into restore/save (rather than the combined actions/cache@v4)
      # so the save step below can run with `if: always()` — a combined
      # cache step's automatic post-save does NOT reliably fire when a later
      # step in the job fails, which is exactly the case where we need the
      # freshly-minted cert saved the most (otherwise every retry mints
      # another one and burns through Apple's 3-cert cap).
      - name: Restore iOS signing assets cache
        id: restore-signing-cache
        uses: actions/cache/restore@v4
        with:
          path: ios_signing_cache
          key: ios-signing-v1

      - name: Build & upload via fastlane
        run: bundle exec fastlane ios beta
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          FLUTTER_BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}

      # Guards against ever caching an incomplete ios_signing_cache/ (e.g. if
      # cert/sigh fails before producing the .p12/.mobileprovision) — cache
      # keys are immutable once written, so saving an empty/partial directory
      # here would permanently "poison" this key and force every future run
      # to mint (and orphan) a brand new certificate forever.
      - name: Check signing assets exist
        id: check-signing-assets
        if: always()
        run: |
          if [ -f ios_signing_cache/distribution.p12 ] && [ -f ios_signing_cache/AppStore.mobileprovision ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Save iOS signing assets cache
        if: ${{ always() && steps.restore-signing-cache.outputs.cache-hit != 'true' && steps.check-signing-assets.outputs.exists == 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ios_signing_cache
          key: ios-signing-v1

      - name: Upload IPA as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Runner-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
