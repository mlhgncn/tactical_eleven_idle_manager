name: Supabase Schema Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/**'

jobs:
  deploy-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secret; skipping Edge Function deploy." && exit 0
          fi
          echo "run_deploy=true" >> "$GITHUB_ENV"

      - name: Set up Supabase CLI
        if: env.run_deploy == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        if: env.run_deploy == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            echo "Deploying function: $name"
            supabase functions deploy "$name" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          done

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "Missing SUPABASE_DB_URL secret" && exit 1
          fi

      # Supabase's direct DB hostname (db.<ref>.supabase.co) is IPv6-only for
      # this project (confirmed: no A record, only AAAA) - an earlier version
      # of this workflow tried to resolve it down to an IPv4 address before
      # connecting, which can never work for a host with no IPv4 address at
      # all and just failed with "No address associated with hostname".
      # GitHub-hosted runners have IPv6 egress, so connecting directly is the
      # actual fix.
      - name: Apply schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Applying supabase/schema.sql"
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/schema.sql

      - name: Apply migrations folder
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply seed data
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Applying supabase/seed_masked_data.sql"
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f supabase/seed_masked_data.sql

      - name: Verify RLS & policies
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_class WHERE relname='financial_transactions' AND relrowsecurity) THEN
              RAISE EXCEPTION 'financial_transactions row level security NOT enabled';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='financial_transactions') THEN
              RAISE EXCEPTION 'No policies defined for financial_transactions';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_class WHERE relname='admin_users' AND relrowsecurity) THEN
              RAISE EXCEPTION 'admin_users row level security NOT enabled';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='admin_users') THEN
              RAISE EXCEPTION 'No policies defined for admin_users';
            END IF;
          END;
          $$;
          SELECT 'RLS and policies verification completed';
          SQL
