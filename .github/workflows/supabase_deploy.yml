name: Supabase Schema Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/**'

jobs:
  deploy-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secret; skipping Edge Function deploy." && exit 0
          fi
          echo "run_deploy=true" >> "$GITHUB_ENV"

      - name: Set up Supabase CLI
        if: env.run_deploy == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        if: env.run_deploy == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            echo "Deploying function: $name"
            supabase functions deploy "$name" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          done

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "Missing SUPABASE_DB_URL secret" && exit 1
          fi

      - name: Apply schema
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Resolving Supabase host to IPv4 and applying supabase/schema.sql"
          PYCODE=$(cat <<'PY'
          # Avoid urllib.parse.urlparse here: some Python 3.12 patch versions
          # have a regression where it raises ValueError on a plain hostname
          # ("does not appear to be an IPv4 or IPv6 address") via an overly
          # strict bracketed-host check. A small regex does the same job
          # without going through that codepath.
          import os, re, socket
          u = os.environ['SUPABASE_DB_URL']
          m = re.match(r'^(?P<scheme>[a-zA-Z][a-zA-Z0-9+.-]*)://(?:(?P<userinfo>[^@]*)@)?(?P<host>[^:/?#]+)(?::(?P<port>\d+))?(?P<rest>[/?#].*)?$', u)
          if not m:
              raise ValueError('Could not parse SUPABASE_DB_URL')
          host = m.group('host')
          port = m.group('port') or ''
          userinfo = m.group('userinfo') or ''
          rest = m.group('rest') or ''
          addrs = socket.getaddrinfo(host, None, socket.AF_INET)
          ipv4 = addrs[0][4][0]
          netloc = (userinfo + '@' if userinfo else '') + ipv4 + ((':' + port) if port else '')
          new = f"{m.group('scheme')}://{netloc}{rest}"
          print(new)
          PY
          )
          NEW_DB_URL=$(python3 -c "$PYCODE")
          echo "Applying supabase/schema.sql to $NEW_DB_URL"
          psql "$NEW_DB_URL" -v ON_ERROR_STOP=1 -f supabase/schema.sql

      - name: Apply migrations folder
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Resolving Supabase host to IPv4 and applying SQL files in supabase/migrations"
          PYCODE=$(cat <<'PY'
          # Avoid urllib.parse.urlparse here: some Python 3.12 patch versions
          # have a regression where it raises ValueError on a plain hostname
          # ("does not appear to be an IPv4 or IPv6 address") via an overly
          # strict bracketed-host check. A small regex does the same job
          # without going through that codepath.
          import os, re, socket
          u = os.environ['SUPABASE_DB_URL']
          m = re.match(r'^(?P<scheme>[a-zA-Z][a-zA-Z0-9+.-]*)://(?:(?P<userinfo>[^@]*)@)?(?P<host>[^:/?#]+)(?::(?P<port>\d+))?(?P<rest>[/?#].*)?$', u)
          if not m:
              raise ValueError('Could not parse SUPABASE_DB_URL')
          host = m.group('host')
          port = m.group('port') or ''
          userinfo = m.group('userinfo') or ''
          rest = m.group('rest') or ''
          addrs = socket.getaddrinfo(host, None, socket.AF_INET)
          ipv4 = addrs[0][4][0]
          netloc = (userinfo + '@' if userinfo else '') + ipv4 + ((':' + port) if port else '')
          new = f"{m.group('scheme')}://{netloc}{rest}"
          print(new)
          PY
          )
          NEW_DB_URL=$(python3 -c "$PYCODE")
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f to $NEW_DB_URL"
            psql "$NEW_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply seed data
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Resolving Supabase host to IPv4 and applying supabase/seed_masked_data.sql"
          PYCODE=$(cat <<'PY'
          # Avoid urllib.parse.urlparse here: some Python 3.12 patch versions
          # have a regression where it raises ValueError on a plain hostname
          # ("does not appear to be an IPv4 or IPv6 address") via an overly
          # strict bracketed-host check. A small regex does the same job
          # without going through that codepath.
          import os, re, socket
          u = os.environ['SUPABASE_DB_URL']
          m = re.match(r'^(?P<scheme>[a-zA-Z][a-zA-Z0-9+.-]*)://(?:(?P<userinfo>[^@]*)@)?(?P<host>[^:/?#]+)(?::(?P<port>\d+))?(?P<rest>[/?#].*)?$', u)
          if not m:
              raise ValueError('Could not parse SUPABASE_DB_URL')
          host = m.group('host')
          port = m.group('port') or ''
          userinfo = m.group('userinfo') or ''
          rest = m.group('rest') or ''
          addrs = socket.getaddrinfo(host, None, socket.AF_INET)
          ipv4 = addrs[0][4][0]
          netloc = (userinfo + '@' if userinfo else '') + ipv4 + ((':' + port) if port else '')
          new = f"{m.group('scheme')}://{netloc}{rest}"
          print(new)
          PY
          )
          NEW_DB_URL=$(python3 -c "$PYCODE")
          echo "Applying supabase/seed_masked_data.sql to $NEW_DB_URL"
          psql "$NEW_DB_URL" -v ON_ERROR_STOP=1 -f supabase/seed_masked_data.sql

      - name: Verify RLS & policies
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Resolving Supabase host to IPv4 and verifying RLS and policies"
          PYCODE=$(cat <<'PY'
          # Avoid urllib.parse.urlparse here: some Python 3.12 patch versions
          # have a regression where it raises ValueError on a plain hostname
          # ("does not appear to be an IPv4 or IPv6 address") via an overly
          # strict bracketed-host check. A small regex does the same job
          # without going through that codepath.
          import os, re, socket
          u = os.environ['SUPABASE_DB_URL']
          m = re.match(r'^(?P<scheme>[a-zA-Z][a-zA-Z0-9+.-]*)://(?:(?P<userinfo>[^@]*)@)?(?P<host>[^:/?#]+)(?::(?P<port>\d+))?(?P<rest>[/?#].*)?$', u)
          if not m:
              raise ValueError('Could not parse SUPABASE_DB_URL')
          host = m.group('host')
          port = m.group('port') or ''
          userinfo = m.group('userinfo') or ''
          rest = m.group('rest') or ''
          addrs = socket.getaddrinfo(host, None, socket.AF_INET)
          ipv4 = addrs[0][4][0]
          netloc = (userinfo + '@' if userinfo else '') + ipv4 + ((':' + port) if port else '')
          new = f"{m.group('scheme')}://{netloc}{rest}"
          print(new)
          PY
          )
          NEW_DB_URL=$(python3 -c "$PYCODE")
          psql "$NEW_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_class WHERE relname='financial_transactions' AND relrowsecurity) THEN
              RAISE EXCEPTION 'financial_transactions row level security NOT enabled';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='financial_transactions') THEN
              RAISE EXCEPTION 'No policies defined for financial_transactions';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_class WHERE relname='admin_users' AND relrowsecurity) THEN
              RAISE EXCEPTION 'admin_users row level security NOT enabled';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='admin_users') THEN
              RAISE EXCEPTION 'No policies defined for admin_users';
            END IF;
          END;
          $$;
          SELECT 'RLS and policies verification completed';
          SQL
