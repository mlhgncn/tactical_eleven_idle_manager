name: Supabase Schema Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - 'supabase/**'

jobs:
  deploy-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secret; skipping Edge Function deploy." && exit 0
          fi
          echo "run_deploy=true" >> "$GITHUB_ENV"

      - name: Set up Supabase CLI
        if: env.run_deploy == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        if: env.run_deploy == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            echo "Deploying function: $name"
            supabase functions deploy "$name" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          done

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "Missing SUPABASE_DB_URL secret" && exit 1
          fi

      # db.<ref>.supabase.co (the direct connection host in SUPABASE_DB_URL)
      # is IPv6-only for this project (confirmed via nslookup: AAAA record
      # only, no A record) and GitHub-hosted runners have no IPv6 egress
      # ("Network is unreachable" when psql tried it directly). Route
      # through Supabase's session-mode connection pooler instead, which
      # resolves to an IPv4 address and behaves like a normal Postgres
      # connection for DDL/multi-statement scripts (unlike the transaction-
      # mode pooler on port 6543, which doesn't support that).
      - name: Compute pooler connection string
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          PYCODE=$(cat <<'PY'
          import os, re
          u = os.environ['SUPABASE_DB_URL']
          m = re.match(r'^(?P<scheme>[a-zA-Z][a-zA-Z0-9+.-]*)://(?P<user>[^:@]*)(?::(?P<password>[^@]*))?@(?P<host>[^:/?#]+)(?::(?P<port>\d+))?(?P<rest>[/?#].*)?$', u)
          if not m:
              raise ValueError('Could not parse SUPABASE_DB_URL')
          host_match = re.match(r'^db\.([^.]+)\.supabase\.co$', m.group('host'))
          if not host_match:
              raise ValueError('Unexpected SUPABASE_DB_URL host: ' + m.group('host'))
          project_ref = host_match.group(1)
          user = m.group('user') or 'postgres'
          password = m.group('password') or ''
          rest = m.group('rest') or '/postgres'
          pooler_host = 'aws-0-eu-central-1.pooler.supabase.com'
          new_user = user + '.' + project_ref
          print(f'postgresql://{new_user}:{password}@{pooler_host}:5432{rest}')
          PY
          )
          POOLER_URL=$(python3 -c "$PYCODE")
          echo "::add-mask::$POOLER_URL"
          echo "POOLER_DB_URL=$POOLER_URL" >> "$GITHUB_ENV"

      - name: Apply schema
        run: |
          echo "Applying supabase/schema.sql"
          psql "$POOLER_DB_URL" -v ON_ERROR_STOP=1 -f supabase/schema.sql

      - name: Apply migrations folder
        run: |
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            psql "$POOLER_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Apply seed data
        run: |
          echo "Applying supabase/seed_masked_data.sql"
          psql "$POOLER_DB_URL" -v ON_ERROR_STOP=1 -f supabase/seed_masked_data.sql

      - name: Verify RLS & policies
        run: |
          psql "$POOLER_DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_class WHERE relname='financial_transactions' AND relrowsecurity) THEN
              RAISE EXCEPTION 'financial_transactions row level security NOT enabled';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='financial_transactions') THEN
              RAISE EXCEPTION 'No policies defined for financial_transactions';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_class WHERE relname='admin_users' AND relrowsecurity) THEN
              RAISE EXCEPTION 'admin_users row level security NOT enabled';
            END IF;
            IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='admin_users') THEN
              RAISE EXCEPTION 'No policies defined for admin_users';
            END IF;
          END;
          $$;
          SELECT 'RLS and policies verification completed';
          SQL
