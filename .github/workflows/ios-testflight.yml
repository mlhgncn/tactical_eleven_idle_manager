name: iOS TestFlight CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    name: Build iOS and upload to TestFlight
    runs-on: macos-latest
    env:
      FLUTTER_CHANNEL: stable
      BUILD_NAME: ${{ github.ref == 'refs/heads/main' && '1.0.1' || '1.0.1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          sudo gem install cocoapods -v 1.15.4 --no-document || true
          pod install --project-directory=ios || true

      - name: Resolve Swift Package Manager dependencies (retry)
        run: |
          set -e
          echo "Resolving SPM dependencies (may retry on transient network errors)"
          for i in 1 2 3; do
            xcodebuild -resolvePackageDependencies -workspace ios/Runner.xcworkspace -scheme Runner && break || {
              echo "SPM resolve attempt $i failed, retrying in 10s..."
              sleep 10
            }
          done

      - name: Decode certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          set -e
          if [ -n "$P12_BASE64" ]; then
            echo "$P12_BASE64" | base64 --decode > /tmp/dist.p12
            security create-keychain -p "build" build.keychain
            security import /tmp/dist.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign || true
            security list-keychains -s build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "build" build.keychain
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision || true

      - name: Build IPA (with retries)
        env:
          FLUTTER_BUILD_NAME: ${{ secrets.FLUTTER_BUILD_NAME }}
          FLUTTER_BUILD_NUMBER: ${{ secrets.FLUTTER_BUILD_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          echo "Building iOS with dart-define values (no codesign)"
          for i in 1 2 3; do
            flutter build ipa --release --no-skip-install && break || {
              echo "flutter build attempt $i failed, waiting 20s before retry..."
              sleep 20
            }
          done

      - name: Install fastlane
        run: |
          gem install fastlane -NV

      - name: Create App Store Connect API key file
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p /tmp/asc
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > /tmp/asc/AuthKey.p8
          cat > /tmp/asc/api_key.json <<EOF
{ "key_id": "${APP_STORE_CONNECT_KEY_ID}", "issuer_id": "${APP_STORE_CONNECT_ISSUER_ID}", "key": "$(sed ':a;N;$!ba;s/\n/\\n/g' /tmp/asc/AuthKey.p8)" }
EOF

      - name: Upload to TestFlight with fastlane
        env:
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          set -e
          # fastlane pilot upload using App Store Connect API key
          bundle exec fastlane pilot upload -i build/ios/ipa/*.ipa --api_key_path /tmp/asc/api_key.json ||
          fastlane pilot upload -i build/ios/ipa/*.ipa --api_key_path /tmp/asc/api_key.json

      - name: Upload artifacts for debugging
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa


# Required GitHub secrets (set in repo Settings → Secrets):
# - P12_BASE64: Base64 encoded distribution .p12 certificate
# - P12_PASSWORD: Password for the .p12
# - MOBILEPROVISION_BASE64: Base64 encoded provisioning profile (.mobileprovision)
# - APP_STORE_CONNECT_KEY_BASE64: Base64 encoded App Store Connect private key (.p8)
# - APP_STORE_CONNECT_KEY_ID: App Store Connect API Key ID (e.g., ABCDE12345)
# - APP_STORE_CONNECT_ISSUER_ID: App Store Connect Issuer ID (UUID)
# - APP_IDENTIFIER: com.yourcompany.yourapp
# - SUPABASE_URL, SUPABASE_ANON_KEY, etc. as needed
# - FLUTTER_BUILD_NAME, FLUTTER_BUILD_NUMBER (optional overrides)
# - APP_SPECIFIC_PASSWORD (alternative: use API key; app-specific password can be used for altool if needed)
