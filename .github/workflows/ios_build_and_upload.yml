name: iOS Build and Upload (robust)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-upload:
    name: Build iOS and upload to TestFlight
    runs-on: macos-latest
    env:
      FLUTTER_CHANNEL: stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Flutter and Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/pub
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install Flutter deps
        run: |
          flutter pub get

      - name: Setup Ruby and CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            Pods
            ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install CocoaPods and run pod install
        run: |
          gem install cocoapods -v 1.15.4 --no-document || true
          pod repo update || true
          pod install --project-directory=ios || true

      - name: Prefetch binary hosts and resolve SPM (retries)
        run: |
          set -e
          hosts=("https://dl.google.com" "https://github.com")
          for host in "${hosts[@]}"; do
            for i in 1 2 3 4; do
              curl -sSfI --max-time 20 "$host" && break || sleep 5
            done
          done

          for i in 1 2 3 4 5; do
            xcodebuild -resolvePackageDependencies -workspace ios/Runner.xcworkspace -scheme Runner && break || {
              echo "SPM resolve failed (attempt $i), running swift package resolve"
              (cd ios && swift package resolve) || true
              sleep 15
            }
          done

      - name: Import certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          set -e
          if [ -n "$P12_BASE64" ]; then
            echo "$P12_BASE64" | base64 --decode > /tmp/dist.p12
            security create-keychain -p build build.keychain
            security import /tmp/dist.p12 -k ~/Library/Keychains/build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign || true
            security list-keychains -s ~/Library/Keychains/build.keychain
            security default-keychain -s ~/Library/Keychains/build.keychain
            security unlock-keychain -p build ~/Library/Keychains/build.keychain
            security set-key-partition-list -S apple-tool:,apple: -s -k build ~/Library/Keychains/build.keychain || true
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          if [ -n "$MOBILEPROVISION_BASE64" ]; then
            echo "$MOBILEPROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          fi

      - name: Build IPA (with retries)
        env:
          FLUTTER_BUILD_NAME: ${{ secrets.FLUTTER_BUILD_NAME }}
          FLUTTER_BUILD_NUMBER: ${{ secrets.FLUTTER_BUILD_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          echo "Starting flutter build ipa"
          for i in 1 2 3 4; do
            flutter build ipa --release --no-skip-install && break || {
              echo "flutter build failed (attempt $i). Retrying in $((30*i))s"
              sleep $((30*i))
            }
          done

      - name: Install fastlane
        run: |
          gem install fastlane -NV || true

      - name: Create App Store Connect API key file
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p /tmp/asc
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > /tmp/asc/AuthKey.p8
          jq -n --arg kid "$APP_STORE_CONNECT_KEY_ID" --arg iss "$APP_STORE_CONNECT_ISSUER_ID" --arg key "$(sed ':a;N;$!ba;s/\n/\\n/g' /tmp/asc/AuthKey.p8)" '{key_id:$kid,issuer_id:$iss,key:$key}' > /tmp/asc/api_key.json

      - name: Upload IPA to TestFlight (fastlane)
        env:
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
        run: |
          set -e
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found; listing build/ios/ipa:"; ls -la build/ios/ipa || true; exit 1
          fi
          echo "Uploading $IPA_PATH to TestFlight"
          bundle exec fastlane pilot upload -i "$IPA_PATH" --api_key_path /tmp/asc/api_key.json || fastlane pilot upload -i "$IPA_PATH" --api_key_path /tmp/asc/api_key.json

      - name: Upload artifacts_for_debugging
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa

      - name: Print useful diagnostics (xcode & swift)
        run: |
          xcodebuild -version || true
          xcrun swift -version || true

# Required GitHub secrets:
# - P12_BASE64, P12_PASSWORD, MOBILEPROVISION_BASE64
# - APP_STORE_CONNECT_KEY_BASE64, APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID
# - APP_IDENTIFIER
# - SUPABASE_URL, SUPABASE_ANON_KEY (if used in build)
# - FLUTTER_BUILD_NAME, FLUTTER_BUILD_NUMBER (optional)
name: iOS Build & TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-and-upload:
    runs-on: macos-latest
    env:
      FLUTTER_CHANNEL: stable
      APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # Firebase: base64-encoded GoogleService-Info.plist
      FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
      # RevenueCat
      REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
      # AdMob IDs
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
      ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Install Ruby & Fastlane
        run: |
          brew install ruby || true
          gem install bundler || true
          gem install fastlane -NV

      - name: Restore packages
        run: flutter pub get

      - name: Decode Firebase GoogleService-Info.plist
        if: env.FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64 != ''
        run: |
          echo "Decoding GoogleService-Info.plist"
          echo "$FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Validate required CI secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing Supabase CI secrets (SUPABASE_URL or SUPABASE_ANON_KEY)" >&2
            exit 1
          fi
          if [ -z "$REVENUECAT_API_KEY" ]; then
            echo "Warning: REVENUECAT_API_KEY is empty" >&2
          fi
          if [ -z "$ADMOB_APP_ID" ]; then
            echo "Warning: ADMOB_APP_ID is empty" >&2
          fi

      - name: Build iOS with dart-defines (SUPABASE, Ads, RevenueCat)
        run: |
          echo "Building iOS with dart-define values (no codesign)"
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUECAT_API_KEY=$REVENUECAT_API_KEY \
            --dart-define=ADMOB_APP_ID=$ADMOB_APP_ID \
            --dart-define=ADMOB_INTERSTITIAL_AD_UNIT_ID=$ADMOB_INTERSTITIAL_AD_UNIT_ID \
            --dart-define=ADMOB_REWARDED_AD_UNIT_ID=$ADMOB_REWARDED_AD_UNIT_ID

      - name: Debug App Store Connect secret
        run: |
          echo "APP_STORE_CONNECT_PRIVATE_KEY_BASE64 length: ${#APP_STORE_CONNECT_PRIVATE_KEY_BASE64}"
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]; then
            echo "Missing APP_STORE_CONNECT_PRIVATE_KEY_BASE64 secret" >&2
            exit 1
          fi
          if [ ${#APP_STORE_CONNECT_PRIVATE_KEY_BASE64} -lt 100 ]; then
            echo "APP_STORE_CONNECT_PRIVATE_KEY_BASE64 looks too short" >&2
            exit 1
          fi
      - name: Prepare App Store Connect API key
        run: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          echo "APP_AUTH_KEY_PATH=/tmp/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Run Fastlane beta lane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          APP_AUTH_KEY_PATH: /tmp/AuthKey.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
        run: |
          bundle exec fastlane beta || fastlane beta
