name: iOS Build & TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-and-upload:
    runs-on: macos-latest
    env:
      FLUTTER_CHANNEL: stable
      APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # Firebase: base64-encoded GoogleService-Info.plist
      FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
      # RevenueCat
      REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
      # AdMob IDs
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
      ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Install Ruby & Fastlane
        run: |
          brew install ruby || true
          gem install bundler || true
          gem install fastlane -NV

      - name: Restore packages
        run: flutter pub get

      - name: Decode Firebase GoogleService-Info.plist
        if: env.FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64 != ''
        run: |
          echo "Decoding GoogleService-Info.plist"
          echo "$FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Validate required CI secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing Supabase CI secrets (SUPABASE_URL or SUPABASE_ANON_KEY)" >&2
            exit 1
          fi
          if [ -z "$REVENUECAT_API_KEY" ]; then
            echo "Warning: REVENUECAT_API_KEY is empty" >&2
          fi
          if [ -z "$ADMOB_APP_ID" ]; then
            echo "Warning: ADMOB_APP_ID is empty" >&2
          fi

      - name: Build iOS with dart-defines (SUPABASE, Ads, RevenueCat)
        run: |
          echo "Building iOS with dart-define values (no codesign)"
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUECAT_API_KEY=$REVENUECAT_API_KEY \
            --dart-define=ADMOB_APP_ID=$ADMOB_APP_ID \
            --dart-define=ADMOB_INTERSTITIAL_AD_UNIT_ID=$ADMOB_INTERSTITIAL_AD_UNIT_ID \
            --dart-define=ADMOB_REWARDED_AD_UNIT_ID=$ADMOB_REWARDED_AD_UNIT_ID

      - name: Debug App Store Connect secret
        run: |
          echo "APP_STORE_CONNECT_PRIVATE_KEY_BASE64 length: ${#APP_STORE_CONNECT_PRIVATE_KEY_BASE64}"
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]; then
            echo "Missing APP_STORE_CONNECT_PRIVATE_KEY_BASE64 secret" >&2
            exit 1
          fi
          if [ ${#APP_STORE_CONNECT_PRIVATE_KEY_BASE64} -lt 100 ]; then
            echo "APP_STORE_CONNECT_PRIVATE_KEY_BASE64 looks too short" >&2
            exit 1
          fi
      - name: Prepare App Store Connect API key
        run: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          echo "APP_AUTH_KEY_PATH=/tmp/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Run Fastlane beta lane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          APP_AUTH_KEY_PATH: /tmp/AuthKey.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
        run: |
          bundle exec fastlane beta || fastlane beta
