name: iOS Build and Upload

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-upload:
    name: Build iOS and upload to TestFlight
    runs-on: macos-latest
    env:
      FLUTTER_CHANNEL: stable
      BUILD_NAME: ${{ github.ref == 'refs/heads/main' && '1.0.1' || '1.0.1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Install dependencies
        run: |
          flutter pub get
          sudo gem install cocoapods -v 1.15.4 --no-document || true
          pod install --project-directory=ios || true

      - name: Prefetch common binary hosts and Resolve SPM dependencies (aggressive retry)
        run: |
          set -e
          echo "Checking network to dl.google.com and prefetching common hosts"
          for url in "https://dl.google.com" "https://github.com"; do
            for j in 1 2 3 4 5; do
              curl -sSfI --max-time 30 "$url" && break || {
                echo "Network check to $url failed (attempt $j), retrying in 5s..."
                sleep 5
              }
            done
          done

          echo "Attempting SPM resolve and swift package resolve with retries"
          for i in 1 2 3 4 5 6; do
            ( xcodebuild -resolvePackageDependencies -workspace ios/Runner.xcworkspace -scheme Runner && echo SPM_RESOLVED=1 || echo SPM_RESOLVED=0 ) | grep SPM_RESOLVED=1 && break || {
              echo "SPM resolve attempt $i failed, running swift package resolve and retrying in 20s..."
              (cd ios && swift package resolve) || true
              sleep 20
            }
          done

      - name: Decode certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
        run: |
          set -e
          if [ -n "$P12_BASE64" ]; then
            echo "$P12_BASE64" | base64 --decode > /tmp/dist.p12
            security create-keychain -p "build" build.keychain
            security import /tmp/dist.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign || true
            security list-keychains -s build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "build" build.keychain
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$MOBILEPROVISION_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision || true

      - name: Build IPA (with retries)
        env:
          FLUTTER_BUILD_NAME: ${{ secrets.FLUTTER_BUILD_NAME }}
          FLUTTER_BUILD_NUMBER: ${{ secrets.FLUTTER_BUILD_NUMBER }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          echo "Building iOS with dart-define values (no codesign)"
          for i in 1 2 3 4 5; do
            flutter build ipa --release --no-skip-install && break || {
              echo "flutter build attempt $i failed, waiting $((20*i))s before retry..."
              sleep $((20*i))
            }
          done

      - name: Install fastlane
        run: |
          gem install fastlane -NV

      - name: Create App Store Connect API key file
        env:
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          mkdir -p /tmp/asc
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > /tmp/asc/AuthKey.p8
          cat > /tmp/asc/api_key.json <<EOF
{ "key_id": "${APP_STORE_CONNECT_KEY_ID}", "issuer_id": "${APP_STORE_CONNECT_ISSUER_ID}", "key": "$(sed ':a;N;$!ba;s/\n/\\n/g' /tmp/asc/AuthKey.p8)" }
EOF

      - name: Upload to TestFlight with fastlane
        env:
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          set -e
          # fastlane pilot upload using App Store Connect API key
          bundle exec fastlane pilot upload -i build/ios/ipa/*.ipa --api_key_path /tmp/asc/api_key.json ||
          fastlane pilot upload -i build/ios/ipa/*.ipa --api_key_path /tmp/asc/api_key.json

      - name: Upload artifacts for debugging
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa


# Required GitHub secrets (set in repo Settings → Secrets):
# - P12_BASE64: Base64 encoded distribution .p12 certificate
# - P12_PASSWORD: Password for the .p12
# - MOBILEPROVISION_BASE64: Base64 encoded provisioning profile (.mobileprovision)
# - APP_STORE_CONNECT_KEY_BASE64: Base64 encoded App Store Connect private key (.p8)
# - APP_STORE_CONNECT_KEY_ID: App Store Connect API Key ID (e.g., ABCDE12345)
# - APP_STORE_CONNECT_ISSUER_ID: App Store Connect Issuer ID (UUID)
# - APP_IDENTIFIER: com.yourcompany.yourapp
# - SUPABASE_URL, SUPABASE_ANON_KEY, etc. as needed
# - FLUTTER_BUILD_NAME, FLUTTER_BUILD_NUMBER (optional overrides)
# - APP_SPECIFIC_PASSWORD (alternative: use API key; app-specific password can be used for altool if needed)
name: iOS Build & TestFlight

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-and-upload:
    runs-on: macos-latest
    env:
      FLUTTER_CHANNEL: stable
      APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # Firebase: base64-encoded GoogleService-Info.plist
      FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
      # RevenueCat
      REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
      # AdMob IDs
      ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
      ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
      ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.4

      - name: Install Ruby & Fastlane
        run: |
          brew install ruby || true
          gem install bundler || true
          gem install fastlane -NV

      - name: Restore packages
        run: flutter pub get

      - name: Decode Firebase GoogleService-Info.plist
        if: env.FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64 != ''
        run: |
          echo "Decoding GoogleService-Info.plist"
          echo "$FIREBASE_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Validate required CI secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing Supabase CI secrets (SUPABASE_URL or SUPABASE_ANON_KEY)" >&2
            exit 1
          fi
          if [ -z "$REVENUECAT_API_KEY" ]; then
            echo "Warning: REVENUECAT_API_KEY is empty" >&2
          fi
          if [ -z "$ADMOB_APP_ID" ]; then
            echo "Warning: ADMOB_APP_ID is empty" >&2
          fi

      - name: Build iOS with dart-defines (SUPABASE, Ads, RevenueCat)
        run: |
          echo "Building iOS with dart-define values (no codesign)"
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=REVENUECAT_API_KEY=$REVENUECAT_API_KEY \
            --dart-define=ADMOB_APP_ID=$ADMOB_APP_ID \
            --dart-define=ADMOB_INTERSTITIAL_AD_UNIT_ID=$ADMOB_INTERSTITIAL_AD_UNIT_ID \
            --dart-define=ADMOB_REWARDED_AD_UNIT_ID=$ADMOB_REWARDED_AD_UNIT_ID

      - name: Debug App Store Connect secret
        run: |
          echo "APP_STORE_CONNECT_PRIVATE_KEY_BASE64 length: ${#APP_STORE_CONNECT_PRIVATE_KEY_BASE64}"
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]; then
            echo "Missing APP_STORE_CONNECT_PRIVATE_KEY_BASE64 secret" >&2
            exit 1
          fi
          if [ ${#APP_STORE_CONNECT_PRIVATE_KEY_BASE64} -lt 100 ]; then
            echo "APP_STORE_CONNECT_PRIVATE_KEY_BASE64 looks too short" >&2
            exit 1
          fi
      - name: Prepare App Store Connect API key
        run: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > /tmp/AuthKey.p8
          echo "APP_AUTH_KEY_PATH=/tmp/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Run Fastlane beta lane
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
          APP_AUTH_KEY_PATH: /tmp/AuthKey.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          BUNDLE_ID: ${{ secrets.BUNDLE_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          REVENUECAT_API_KEY: ${{ secrets.REVENUECAT_API_KEY }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_INTERSTITIAL_AD_UNIT_ID: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
          ADMOB_REWARDED_AD_UNIT_ID: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
        run: |
          bundle exec fastlane beta || fastlane beta
